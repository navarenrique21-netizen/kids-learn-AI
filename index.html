<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kids Learning</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="app">
    <header>
      <h1 id="lessonTitle">Build a word</h1>
      <button id="langToggle" class="lang-toggle">ES</button>
    </header>

    <div class="stats">
      <div><label for="score">Score</label>: <span id="score">0</span></div>
      <div><label for="highScore">Best</label>: <span id="highScore">0</span></div>
      <div><label for="time">Time</label>: <span id="time">00:00</span></div>
    </div>

    <div class="card">
      <p id="lessonText"></p>
      <div class="levels">
        <button class="level-btn active" data-level="0">2</button>
        <button class="level-btn" data-level="1">3</button>
        <button class="level-btn" data-level="2">4</button>
        <button class="level-btn" data-level="3">5+</button>
      </div>
      <p id="levelDescription" class="muted"></p>

      <div id="targetWord" class="target">?</div>
      <div id="answerDisplay" class="answer"></div>

      <div id="letterButtons" class="letters"></div>

      <div class="controls">
        <button id="submitBtn" class="primary">Check</button>
        <button id="clearBtn">Clear</button>
        <button id="hintBtn">Hint</button>
        <button id="sayBtn">Say</button>
        <button id="nextBtn">Next</button>
      </div>
      <div id="message" class="message"></div>
    </div>

    <div class="footer">
      <small>Made for Kids Learning • GitHub ready</small>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
